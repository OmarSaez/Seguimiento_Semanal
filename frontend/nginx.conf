server {
    listen 80;
    server_name askone.diinf.usach.cl;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name askone.diinf.usach.cl;

    ssl_certificate /etc/letsencrypt/live/askone.diinf.usach.cl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/askone.diinf.usach.cl/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # DNS interno de Docker para resolver nombres dinámicamente
    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # Usar variable para evitar que Nginx falle si el backend no ha iniciado
        set $backend_upstream backend;
        proxy_pass http://$backend_upstream:8080;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
