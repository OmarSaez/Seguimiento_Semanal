services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: tracking_db
    restart: always
    environment:
      POSTGRES_DB: avance_semanal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tracking-network

  # Backend (Spring Boot)
  backend:
    image: omarsaez/seguimiento-backend:latest
    container_name: tracking_backend
    restart: always
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/avance_semanal
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    networks:
      - tracking-network

  # Frontend (Vite + Nginx)
  frontend:
    image: omarsaez/seguimiento-frontend:latest
    container_name: tracking_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - webroot:/var/www/certbot:ro
    networks:
      - tracking-network

  # Certbot (Para certificados SSL reales)
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  tracking-network:
    driver: bridge

volumes:
  postgres_data:
  certbot-etc:
  certbot-var:
  webroot:
